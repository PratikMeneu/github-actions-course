name: 13 - Using caching
on:
    workflow_dispatch:
        inputs:
            use-cache:
                description: Whether to execute cache step
                type: boolean
                default: true

            node-version:
                description: Node version
                type: choice
                options:
                    - 18.x
                    - 20.x
                    - 21.x
                default: 20.x

jobs:
    build:
        runs-on: ubuntu-latest
        needs: install-deps
        defaults:
            run:
                working-directory: 13-caching/react-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                node-version: ${{ inputs.node-version }}

            - name: Download cached dependencies
              if: ${{ inputs.use-cache }}
              uses: actions/cache@v3
              with:
                key: ${{ needs.install-deps.outputs.deps-cache-key }}
                path: 13-caching/react-app/node_modules
            
            - name: Testing
              run: npm run test

            - name: Building
              run: npm run build

            - name: Deploying to nonprod
              run: echo "Deploying to nonprod...."

## dedicated job for caching to prevent the parallel installation of dependencies once the package-lock.json file changes.
    install-deps:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 13-caching/react-app
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                node-version: ${{ inputs.node-version }}
            
            - name: Calculate cache key
              id: cache-key
              run: |
                echo "CACHE_KEY=deps-node-modules-${{ hashFiles('13-caching/react-app/package-lock.json') }}" >> "$GITHUB_OUTPUT"

            - name: Download cached dependencies
              id: cache
              if: ${{ inputs.use-cache }}
              uses: actions/cache@v3
              with:
                key: ${{ steps.cache-key.outputs.CACHE_KEY }}
                path: 13-caching/react-app/node_modules
            
            - name: Install dependencies
              if: steps.cache.outputs.cache-hit != 'true'
              run: npm ci

        outputs:
            deps-cache-key: ${{ steps.cache-key.outputs.CACHE_KEY }}

    linting:
      runs-on: ubuntu-latest
      needs: install-deps
      defaults:
            run:
                working-directory: 13-caching/react-app
      steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Setup Node
          uses: actions/setup-node@v6
          with:
              node-version: ${{ inputs.node-version }}

        - name: Download cached dependencies
          if: ${{ inputs.use-cache }}
          uses: actions/cache@v3
          with:
              key: ${{ needs.install-deps.outputs.deps-cache-key }}
              path: 13-caching/react-app/node_modules

        - name: Testing
          run: npm run test

        - name: Linting
          run: echo "Linting....."
        


